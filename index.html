<script>
    // Smooth scroll buttons
    const buttons = document.querySelectorAll("button");

    buttons[0].addEventListener("click", () => {
        document.querySelector("h2.text-3xl").scrollIntoView({
            behavior: "smooth"
        });
    });

    buttons[1].addEventListener("click", () => {
        window.scrollTo({
            top: document.body.scrollHeight,
            behavior: "smooth"
        });
    });

    // Typing effect
    const text =
        "Aspiring software engineer, tech enthusiast, and problem solver passionate about coding, startups, innovation, and building cool stuff.";

    const paragraph = document.querySelector("p.text-lg");

    paragraph.textContent = "";

    let index = 0;

    function typeText() {
        if (index < text.length) {
            paragraph.textContent += text.charAt(index);
            index++;
            setTimeout(typeText, 30);
        }
    }

    typeText();

    // Console message
    console.log("Welcome to Apoorva's Portfolio 🚀");
</script>
